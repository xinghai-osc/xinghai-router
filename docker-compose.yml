services:
  router:
    build:
      context: .
      dockerfile: Dockerfile
      target: router
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://router:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/router?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      LISTEN_ADDR: :8080
      GEETEST_CAPTCHA_ID: ${GEETEST_CAPTCHA_ID:-}
      GEETEST_CAPTCHA_KEY: ${GEETEST_CAPTCHA_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "${ROUTER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://router:8080
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      router:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: router
      POSTGRES_USER: router
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ${POSTGRES_DATA_PATH:-/mnt/data/AI-Router/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router -d router"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - ${REDIS_DATA_PATH:-/mnt/data/AI-Router/redis}:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
